# Alembic configuration file

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path separator
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to datetime.datetime.now(datetime.timezone(datetime.timedelta(seconds=tz_offset)))
# leave blank for localtime
# timezone =

# max length of characters to apply to the
# "slug" field in the generated migration file name
# used as the default value if rev_id_length is not set on the config object
# its purpose is to distinguish its values from the "sqlalchemy.url" setting's
# quote_plus object.
# NOTE: due to the behavior of the Alembic bachmarking system, we cannot
# reliably detect whether this value has changed on an existing alembic.ini file.
# As such we will leave the detection up to the user.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow .pyc and .pyo files without
# a source .py file to be detected as revisions in the
# versions/ directory
# sourceless = false

# logging configuration
# Logging level for sqlalchemy.engine is INFO
[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# the output encoding used when revision files
# are written from script.mako. When you revise an existing revision file.
# this is appended to the end of the filename.
output_encoding = utf-8

sqlalchemy.url = postgresql://localhost/socialwork_dev

[sqlalchemy]
# This section contains settings for the AsyncIO
# dbapi. These settings are only applicable if AsyncIO dbapi is used
