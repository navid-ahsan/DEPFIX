# ─────────────────────────────────────────────────────────────────────────────
# DEPFIX  •  GitLab CI Integration Template
# ─────────────────────────────────────────────────────────────────────────────
#
# Drop this file into the ROOT of the repository you want DEPFIX to monitor.
# When any job fails, the pipeline automatically ships the log to your
# DEPFIX instance for RAG-powered error analysis.
#
# SETUP — add these as CI/CD Variables in GitLab (Settings → CI/CD → Variables):
#
#   DEPFIX_URL             Your DEPFIX backend URL, e.g. http://192.168.1.10:8000
#   DEPFIX_WEBHOOK_SECRET  The secret set in your DEPFIX .env (DEPFIX_WEBHOOK_SECRET)
#
# ─────────────────────────────────────────────────────────────────────────────

# ── Replace these stages with whatever your project actually uses ─────────────
stages:
  - build
  - test
  - deploy

# ── Reusable snippet: ships job.log to DEPFIX on failure ─────────────────────
# anchor is referenced in each job's after_script
.depfix_send_log: &depfix_send_log
  - |
    echo "Sending failure log to DEPFIX..."
    PAYLOAD=$(python3 -c "
    import json, os
    log = open('job.log').read() if os.path.exists('job.log') else 'No log captured.'
    print(json.dumps({
        'workflow_name': '${CI_JOB_NAME}',
        'run_id':        '${CI_PIPELINE_ID}',
        'repository':    '${CI_PROJECT_PATH}',
        'branch':        '${CI_COMMIT_BRANCH}',
        'commit_sha':    '${CI_COMMIT_SHA}',
        'conclusion':    'failure',
        'log_content':   log
    }))
    ")
    SIG=$(echo -n "$PAYLOAD" \
      | openssl dgst -sha256 -hmac "$DEPFIX_WEBHOOK_SECRET" \
      | awk '{print "sha256="$2}')
    curl -sf -X POST "${DEPFIX_URL}/api/v1/webhook/github-actions" \
      -H "Content-Type: application/json" \
      -H "X-Hub-Signature-256: $SIG" \
      -d "$PAYLOAD" \
      && echo "✓ Log delivered to DEPFIX" \
      || echo "⚠ DEPFIX delivery failed (non-blocking)"

# ─────────────────────────────────────────────────────────────────────────────
# YOUR JOBS
# Add `2>&1 | tee job.log` to your script commands so the output is captured,
# then add the after_script block shown below to each job you want to monitor.
# ─────────────────────────────────────────────────────────────────────────────

build:
  stage: build
  script:
    # ── Replace with your real build command ─────────────────────────────────
    # Example:
    #   pip install -r requirements.txt 2>&1 | tee job.log
    #   docker build -t myapp . 2>&1 | tee job.log
    - your-build-command 2>&1 | tee job.log
  after_script:
    - if [ "$CI_JOB_STATUS" = "failed" ]; then
        *depfix_send_log
      fi

test:
  stage: test
  script:
    # ── Replace with your real test command ──────────────────────────────────
    # Example:
    #   pytest tests/ -v 2>&1 | tee job.log
    - your-test-command 2>&1 | tee job.log
  after_script:
    - if [ "$CI_JOB_STATUS" = "failed" ]; then
        *depfix_send_log
      fi

deploy:
  stage: deploy
  script:
    # ── Replace with your real deploy command ────────────────────────────────
    - your-deploy-command 2>&1 | tee job.log
  after_script:
    - if [ "$CI_JOB_STATUS" = "failed" ]; then
        *depfix_send_log
      fi
  only:
    - main

# ─────────────────────────────────────────────────────────────────────────────
# ALTERNATIVE: upload via the file API (no webhook secret required)
#
#   curl -sf -X POST "${DEPFIX_URL}/api/v1/logs/upload" \
#     -F "file=@job.log" \
#     && echo "✓ Log uploaded to DEPFIX"
# ─────────────────────────────────────────────────────────────────────────────
