[pytest]
# Pytest configuration for RAG application
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
markers =
    unit: Unit tests that don't require external services
    integration: Integration tests requiring services (ollama, pgvector)
    slow: Tests that take a long time to run
log_cli = true
log_cli_level = INFO
filterwarnings =
    ignore::DeprecationWarning
