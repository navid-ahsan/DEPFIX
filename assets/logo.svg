<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#070b18"/>
      <stop offset="100%" stop-color="#0b0f1e"/>
    </linearGradient>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#1a2540" stroke-width="0.4"/>
    </pattern>
    <linearGradient id="depGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ff3c3c"/>
    </linearGradient>
    <linearGradient id="fixGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc6a"/>
    </linearGradient>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="160" fill="url(#bg)" rx="8"/>
  <rect width="600" height="160" fill="url(#grid)" rx="8" opacity="0.25"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="599" height="159" fill="none" stroke="#00d4ff" stroke-width="0.6" stroke-opacity="0.18" rx="7.5"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="4" height="160" fill="#00d4ff" rx="2" opacity="0.75"/>

  <!-- Top-left corner accent -->
  <polyline points="4,24 4,4 24,4" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Bottom-right corner accent -->
  <polyline points="576,156 596,156 596,136" fill="none" stroke="#00d4ff" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Circuit nodes — top right -->
  <circle cx="555" cy="28" r="2.5" fill="#00d4ff" opacity="0.35"/>
  <circle cx="572" cy="18" r="2" fill="#a78bfa" opacity="0.3"/>
  <circle cx="540" cy="40" r="2" fill="#00d4ff" opacity="0.25"/>
  <circle cx="564" cy="44" r="1.5" fill="#ffb700" opacity="0.3"/>
  <line x1="555" y1="28" x2="572" y2="18" stroke="#00d4ff" stroke-width="0.6" opacity="0.2"/>
  <line x1="555" y1="28" x2="540" y2="40" stroke="#00d4ff" stroke-width="0.6" opacity="0.2"/>
  <line x1="555" y1="28" x2="564" y2="44" stroke="#a78bfa" stroke-width="0.6" opacity="0.2"/>

  <!-- Terminal prompt icon -->
  <text x="26" y="96" font-family="Courier New, Courier, monospace" font-size="36" fill="#00d4ff" opacity="0.35" font-weight="bold">&gt;_</text>

  <!-- DEP — error red -->
  <text
    x="96" y="102"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#depGrad)"
    filter="url(#glow-red)"
    letter-spacing="-1"
  >DEP</text>

  <!-- Separator dot cluster -->
  <circle cx="289" cy="72" r="3" fill="#00d4ff" opacity="0.8"/>
  <circle cx="289" cy="60" r="2" fill="#00d4ff" opacity="0.45"/>
  <circle cx="289" cy="84" r="2" fill="#00d4ff" opacity="0.45"/>

  <!-- FIX — fix green -->
  <text
    x="300" y="102"
    font-family="Arial Black, Arial, Helvetica, sans-serif"
    font-size="72"
    font-weight="900"
    fill="url(#fixGrad)"
    filter="url(#glow-green)"
    letter-spacing="-1"
  >FIX</text>

  <!-- Horizontal rule under title -->
  <line x1="96" y1="112" x2="490" y2="112" stroke="#00d4ff" stroke-width="0.4" stroke-opacity="0.2"/>

  <!-- Tagline -->
  <text
    x="96" y="132"
    font-family="Courier New, Courier, monospace"
    font-size="11"
    fill="#4a6a8a"
    letter-spacing="3.5"
  >RAG-POWERED CI/CD ERROR ANALYSIS</text>

  <!-- Version tag -->
  <text x="502" y="148" font-family="Courier New, Courier, monospace" font-size="9" fill="#253550" letter-spacing="2">v2.0</text>
</svg>
